name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=~/biblical-principles-ai-agent-bot

            # Clone or pull latest code
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Install Python dependencies
            pip install -r requirements.txt

            # Write .env file
            cat <<EOF > .env
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            SYSTEM_PROMPT_URL=${{ secrets.SYSTEM_PROMPT_URL }}
            API_KEY=${{ secrets.API_KEY }}
            EOF

            # Ensure logs directory exists
            mkdir -p logs

            # Restart PM2 processes
            pm2 delete biblical-bot-cron || true
            pm2 delete biblical-bot-server || true

            pm2 start main.py --name biblical-bot-cron --interpreter python3 --no-autorestart --cron-restart="0 0 * * *"
            pm2 start server.py --name biblical-bot-server --interpreter python3

            pm2 save

